services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://aivms:aivms@postgres:5432/aivms
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - GO2RTC_URL=http://go2rtc:1984
      - USE_DATABASE=true
      - DEBUG=true
    volumes:
      - ../backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://aivms:aivms@postgres:5432/aivms
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - GO2RTC_URL=http://go2rtc:1984
      - USE_DATABASE=true
      - DEBUG=true
    volumes:
      - ../backend:/app
      - ../models:/app/models
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - gpu
