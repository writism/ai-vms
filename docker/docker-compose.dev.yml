services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://aivms:aivms@postgres:5432/aivms
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - GO2RTC_URL=http://go2rtc:1984
      - USE_DATABASE=true
      - DEBUG=true
    volumes:
      - ../backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      mosquitto:
        condition: service_started

  backend-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://aivms:aivms@postgres:5432/aivms
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - GO2RTC_URL=http://go2rtc:1984
      - USE_DATABASE=true
      - DEBUG=true
    volumes:
      - ../backend:/app
      - ../models:/app/models
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      mosquitto:
        condition: service_started
    profiles:
      - gpu

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
      - NEXT_PUBLIC_GO2RTC_URL=http://go2rtc:1984
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aivms
      POSTGRES_PASSWORD: aivms
      POSTGRES_DB: aivms
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aivms"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquittodata:/mosquitto/data
      - mosquittolog:/mosquitto/log

  go2rtc:
    image: alexxit/go2rtc:latest
    ports:
      - "1984:1984"
      - "8554:8554"
      - "8555:8555"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  mosquittodata:
  mosquittolog:
