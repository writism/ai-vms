services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://aivms:aivms@postgres:5432/aivms
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - GO2RTC_URL=http://host.docker.internal:1984
      - GO2RTC_RTSP_HOST=host.docker.internal
      - CORS_ORIGINS=http://localhost:3000,http://192.168.0.42:3000,https://localhost:3000,https://192.168.0.42:3000
      - USE_DATABASE=true
      - DEBUG=true
      - DISCOVERY_SCAN_SUBNET=192.168.0.0/24
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../backend:/app
      - ../models:/app/models
      - ./certs:/app/certs:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --ssl-keyfile /app/certs/localhost.key --ssl-certfile /app/certs/localhost.crt
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      mosquitto:
        condition: service_started

  backend-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    network_mode: host
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://aivms:aivms@localhost:5432/aivms
      - REDIS_URL=redis://localhost:6379
      - QDRANT_URL=http://localhost:6333
      - MQTT_BROKER_URL=mqtt://localhost:1883
      - GO2RTC_URL=http://localhost:1984
      - CORS_ORIGINS=http://localhost:3000,http://192.168.0.42:3000,https://localhost:3000,https://192.168.0.42:3000
      - USE_DATABASE=true
      - DEBUG=true
      - NVIDIA_VISIBLE_DEVICES=GPU-0076f4bd-15a7-57f7-69ab-9bdccfcd2b09
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      - LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/usr/local/cuda-12.4/lib64
      - OPENCV_FFMPEG_CAPTURE_OPTIONS=rtsp_transport;tcp
      # 튜닝값은 루트 .env 파일에서 관리
    volumes:
      - ../backend:/app
      - ../models:/app/models
      - ./certs:/app/certs:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload --ssl-keyfile /app/certs/localhost.key --ssl-certfile /app/certs/localhost.crt
    healthcheck:
      test: ["CMD-SHELL", "curl -fsk https://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['GPU-0076f4bd-15a7-57f7-69ab-9bdccfcd2b09']
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      mosquitto:
        condition: service_started
    profiles:
      - gpu

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://localhost:8001
      - NEXT_PUBLIC_WS_URL=wss://localhost:8001
      - NEXT_PUBLIC_GO2RTC_URL=http://localhost:1984
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
      - ./certs:/app/certs:ro
    command: npx next dev --hostname 0.0.0.0 --experimental-https --experimental-https-key /app/certs/localhost.key --experimental-https-cert /app/certs/localhost.crt
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aivms
      POSTGRES_PASSWORD: aivms
      POSTGRES_DB: aivms
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aivms"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquittodata:/mosquitto/data
      - mosquittolog:/mosquitto/log

  coturn:
    image: coturn/coturn:latest
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf
    command: -c /etc/coturn/turnserver.conf
    restart: unless-stopped

  go2rtc:
    image: alexxit/go2rtc:latest
    network_mode: host
    volumes:
      - ./go2rtc/go2rtc.yaml:/config/go2rtc.yaml
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  mosquittodata:
  mosquittolog:
