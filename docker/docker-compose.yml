services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://aivms:aivms@postgres:5432/aivms
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - GO2RTC_URL=http://go2rtc:1984
      - USE_DATABASE=true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      mosquitto:
        condition: service_started

  backend-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://aivms:aivms@postgres:5432/aivms
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - GO2RTC_URL=http://go2rtc:1984
      - USE_DATABASE=true
    volumes:
      - ../models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      mosquitto:
        condition: service_started
    profiles:
      - gpu

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
      - NEXT_PUBLIC_GO2RTC_URL=http://go2rtc:1984
      - NEXT_PUBLIC_TURN_URL=turn:coturn:3478
      - NEXT_PUBLIC_TURN_USER=aivms
      - NEXT_PUBLIC_TURN_PASS=aivms1234
    restart: unless-stopped
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aivms
      POSTGRES_PASSWORD: aivms
      POSTGRES_DB: aivms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aivms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  go2rtc:
    image: alexxit/go2rtc:latest
    network_mode: host
    volumes:
      - ./go2rtc/go2rtc.yaml:/config/go2rtc.yaml
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/turnserver.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  mosquitto_data:
  mosquitto_log:
